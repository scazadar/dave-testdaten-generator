server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Docker-interner DNS. Über eine Variable in proxy_pass wird der Upstream
    # erst zur Laufzeit aufgelöst – so startet nginx auch im Standalone-Betrieb
    # (ohne dave-backend im Netz); API-Aufrufe schlagen dann erst beim Request fehl.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Reverse-Proxy zum DAVe-Backend (gleicher Origin -> kein CORS). Der
    # Gateway-Präfix wird gestrippt, analog zum Vite-Dev-Proxy.
    location /api/dave-backend-service/ {
        set $dave_backend "http://dave-backend:50001";
        rewrite ^/api/dave-backend-service/(.*)$ /$1 break;
        proxy_pass $dave_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gzip für Text-Assets
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml font/woff font/woff2 application/font-woff;

    # Gehashte Build-Assets dürfen lange gecached werden
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Die Anwendung nutzt Hash-Routing (#/...), daher genügt der
    # Fallback auf index.html für unbekannte Pfade.
    location / {
        add_header Cache-Control "no-cache";
        try_files  $uri $uri/ /index.html;
    }
}
